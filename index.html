<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple AR</title>
    <!-- 3D Core Library -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #fafafa; }
        model-viewer { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>

    <!-- Explicit intent mapping to force Android to engage system cameras -->
    <model-viewer 
        src="3DModel.glb" 
        alt="A 3D model of your menu dish" 
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        camera-controls 
        auto-rotate
        shadow-intensity="1">
    </model-viewer>

</body>
</html>
