<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital AR Menu</title>
    
    <!-- This script imports Google's official 3D and AR viewing software -->
    <script type="module" src="https://googleapis.com"></script>

    <style>
        /* Basic page setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #f9f9f9; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Header section styling */
        header { text-align: center; padding: 25px; background-color: #ffffff; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h1 { font-size: 26px; color: #e74c3c; margin-bottom: 5px; }
        header p { font-size: 14px; color: #7f8c8d; }

        /* Menu item container card styling */
        .menu-card { background: #ffffff; width: 90%; max-width: 400px; margin: 30px auto; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* 3D Window view dimensions */
        model-viewer { width: 100%; height: 350px; background-color: #fafafa; }

        /* Food information text layout */
        .details { padding: 20px; }
        .dish-header { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .price { color: #27ae60; }
        .description { font-size: 14px; color: #7f8c8d; line-height: 1.5; margin-bottom: 20px; }

        /* AR Button styling */
        .ar-button { background-color: #e74c3c; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .ar-button:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <header>
        <h1>Interactive AR Menu</h1>
        <p>Scan the space on your table to see your dish in 3D!</p>
    </header>

    <div class="menu-card">
        <!-- 
          The 'src' attribute now correctly points to your exact file: 3DModel.glb
        -->
        <model-viewer 
            src="3DModel.glb" 
            alt="3D model of your menu dish" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            shadow-intensity="1" 
            touch-action="none">
            
            <!-- This button automatically shows up only on AR-compatible mobile phones -->
            <button slot="ar-button" class="ar-button">
                📱 View on Your Table
            </button>
        </model-viewer>

        <div class="details">
            <div class="dish-header">
                <span>Delicious House Special</span>
                <span class="price">$15.99</span>
            </div>
            <p class="description">
                Made fresh with premium ingredients, seasoned with house spices, and cooked to absolute perfection. Perfect for sharing!
            </p>
        </div>
    </div>

</body>
</html>
